<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Power Gym - Member Management</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    if (sessionStorage.getItem("adminLoggedIn") !== "true") {
      window.location.href = "admin-login.html";
    }
  </script>
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2>⚡ Power Gym</h2>
      <nav class="nav-links">
        <a href="index.html">📊 Dashboard</a>
        <a href="admin-members.html" class="active">👥 Members</a>
        <a href="trainers.html">🏋️ Trainers</a>
        <a href="classes.html">📅 Classes</a>
        <a href="payments.html">💳 Payments</a>
        <a href="attendance.html">🕒 Attendance</a>
        <a href="admin-settings.html">⚙️ Settings</a>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="header">
        <h1>Member Management</h1>
        <button class="btn-primary" onclick="openMemberModal()">+ Add New Member</button>
      </div>
      
      <!-- Filters and Search -->
      <div class="glass-card" style="margin-bottom: 20px; display: flex; gap: 15px; align-items: center;">
        <input type="text" id="searchInput" placeholder="Search by name or email..." style="padding: 10px; border-radius: 5px; border: none; background: rgba(255,255,255,0.1); color: white; width: 300px;">
        <select id="planFilter" style="padding: 10px; border-radius: 5px; border: none; background: rgba(255,255,255,0.1); color: white;">
            <option value="">All Plans</option>
            <!-- Plans loaded dynamically -->
        </select>
        <button class="btn-primary" onclick="loadMembers()">Filter</button>
        <button class="btn-primary" onclick="exportCSV()" style="margin-left: auto;">Export CSV</button>
      </div>

      <div class="glass-card">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="membersTableBody">
            <!-- Members loaded dynamically -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Member Modal -->
  <div id="memberModal" class="modal">
    <div class="modal-content glass-card">
      <span class="close" onclick="closeMemberModal()">&times;</span>
      <h2 id="modalTitle">Add Member</h2>
      <form id="memberForm" onsubmit="saveMember(event)">
        <input type="hidden" id="memberId">
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="memberName" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="memberEmail" required>
        </div>
        <div class="form-group" id="passwordGroup">
            <label>Password</label>
            <input type="password" id="memberPassword">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="memberPhone" required>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="memberRole" required>
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button type="submit" class="btn-primary" style="margin-top: 15px;">Save</button>
      </form>
    </div>
  </div>

  <style>
    /* Modal Styles */
    .modal {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0;
      width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background-color: #1e293b; margin: 10% auto; padding: 20px;
      border: 1px solid #334155; width: 40%; border-radius: 10px;
    }
    .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
    .close:hover { color: #fff; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #cbd5e1; }
    .form-group input, .form-group select { 
        width: 100%; padding: 10px; border-radius: 5px; 
        border: 1px solid #334155; background: rgba(255,255,255,0.05); color: white;
    }
    .action-btn { background: none; border: none; cursor: pointer; color: #0ea5e9; margin-right: 10px; font-size: 18px; }
    .action-btn.delete { color: #ef4444; }
    
    /* Toast Notification */
    #toast {
        visibility: hidden; min-width: 250px; background-color: #333; color: #fff;
        text-align: center; border-radius: 2px; padding: 16px; position: fixed;
        z-index: 1001; left: 50%; bottom: 30px; transform: translateX(-50%);
    }
    #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
    @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
  </style>

  <div id="toast">Message</div>

  <script src="script.js?v=2"></script>
  <script src="adminMembers.js?v=2"></script>
</body>
</html>
