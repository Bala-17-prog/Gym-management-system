<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (sessionStorage.getItem("adminLoggedIn") !== "true") {
      window.location.href = "admin-login.html";
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings - Power Gym</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2>⚡ Power Gym</h2>
      <nav class="nav-links">
        <a href="index.html">📊 Dashboard</a>
        <a href="admin-members.html">👥 Members</a>
        <a href="trainers.html">🏋️ Trainers</a>
        <a href="classes.html">📅 Classes</a>
        <a href="payments.html">💳 Payments</a>
        <a href="attendance.html">🕒 Attendance</a>
        <a href="admin-settings.html" class="active">⚙️ Settings</a>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="header">
        <div>
          <h1>Settings & Audit Logs</h1>
          <p>Configure gym information and view system audit trails.</p>
        </div>
      </div>

      <div style="display: flex; gap: 2rem; margin-top: 1rem; flex-wrap: wrap;">
        <!-- Gym Info Settings -->
        <div class="glass-card" style="flex: 1; min-width: 300px;">
          <h2 style="margin-bottom: 1rem;">Gym Configuration</h2>
          <form id="settingsForm" onsubmit="saveSettings(event)">
            <div class="form-group">
              <label>Gym Name</label>
              <input type="text" id="gymName" class="form-control" value="Power Gym Elite" required>
            </div>
            <div class="form-group">
              <label>Contact Email</label>
              <input type="email" id="gymEmail" class="form-control" value="contact@powergym.com" required>
            </div>
            <div class="form-group">
              <label>Global Announcement</label>
              <textarea id="gymAnnouncement" class="form-control" rows="3">Welcome to Power Gym! All morning yoga classes are moved to 7:00 AM.</textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Save Settings</button>
          </form>
        </div>

        <!-- Audit Logs -->
        <div class="glass-card" style="flex: 2; min-width: 400px; max-height: 500px; overflow-y: auto;">
          <h2 style="margin-bottom: 1rem;">Audit Logs</h2>
          <table id="auditTable">
            <thead>
              <tr>
                <th>Time</th>
                <th>Admin</th>
                <th>Action</th>
                <th>Entity</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody>
              <!-- Data populated by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
  <script>
    function logoutAdmin() {
      sessionStorage.removeItem("adminLoggedIn");
      window.location.href = "admin-login.html";
    }

    async function loadAuditLogs() {
      const result = await callApi('/audit-logs', 'GET');
      if (result) {
        const tbody = document.querySelector('#auditTable tbody');
        tbody.innerHTML = '';
        
        // Sort newest first
        result.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        
        result.forEach(log => {
          const timeStr = new Date(log.timestamp).toLocaleString();
          tbody.innerHTML += `
            <tr>
              <td><small>${timeStr}</small></td>
              <td>${log.adminEmail}</td>
              <td><span class="badge badge-pending">${log.actionType}</span></td>
              <td>${log.targetEntity}</td>
              <td>${log.details}</td>
            </tr>
          `;
        });
      }
    }

    function saveSettings(e) {
      e.preventDefault();
      // For Phase 2, save static settings to localStorage
      localStorage.setItem('gymName', document.getElementById('gymName').value);
      localStorage.setItem('gymEmail', document.getElementById('gymEmail').value);
      localStorage.setItem('gymAnnouncement', document.getElementById('gymAnnouncement').value);
      alert('Settings saved successfully!');
    }

    function loadSettings() {
      if(localStorage.getItem('gymName')) document.getElementById('gymName').value = localStorage.getItem('gymName');
      if(localStorage.getItem('gymEmail')) document.getElementById('gymEmail').value = localStorage.getItem('gymEmail');
      if(localStorage.getItem('gymAnnouncement')) document.getElementById('gymAnnouncement').value = localStorage.getItem('gymAnnouncement');
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadSettings();
      loadAuditLogs();
    });
  </script>
</body>
</html>
