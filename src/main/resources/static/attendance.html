<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (sessionStorage.getItem("adminLoggedIn") !== "true") {
      window.location.href = "admin-login.html";
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance - Power Gym</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2>⚡ Power Gym</h2>
      <nav class="nav-links">
        <a href="index.html">📊 Dashboard</a>
        <a href="admin-members.html">👥 Members</a>
        <a href="trainers.html">🏋️ Trainers</a>
        <a href="classes.html">📅 Classes</a>
        <a href="payments.html">💳 Payments</a>
        <a href="attendance.html" class="active">🕒 Attendance</a>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="header" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <h1>Attendance</h1>
          <p>Track and manage member attendance records.</p>
        </div>
        <button class="btn btn-primary" onclick="showModal('addAttendanceModal')">+ Mark Attendance</button>
      </div>

      <div class="glass-card">
        <table id="attendanceTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Member ID</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Data populated by JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add Attendance Modal -->
  <div class="modal-backdrop" id="addAttendanceModal">
    <div class="glass-card modal-content">
      <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Mark Attendance</h2>
      <form id="addAttendanceForm" onsubmit="addAttendance(event)">
        <input type="hidden" id="aId">
        <div class="form-group">
          <label>Member ID (User ID)</label>
          <input type="number" id="aUserId" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Date (YYYY-MM-DD)</label>
          <input type="date" id="aDate" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="aStatus" class="form-control" required>
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
          </select>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 2rem;">
          <button type="button" class="btn" style="background: rgba(255,255,255,0.1); color: white; flex: 1;" onclick="hideModal('addAttendanceModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex: 1;">Save Record</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function logoutAdmin() {
      sessionStorage.removeItem("adminLoggedIn");
      window.location.href = "admin-login.html";
    }

    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function hideModal(id) { document.getElementById(id).classList.remove('show'); }

    async function loadAttendance() {
      const result = await callApi('/attendance/all', 'GET');
      if (result) {
        const tbody = document.querySelector('#attendanceTable tbody');
        tbody.innerHTML = '';
        if (result.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #aaa;">No attendance records found.</td></tr>';
            return;
        }
        result.forEach(a => {
          const userName = `ID: ${a.userId}`;
          const badgeClass = a.status === 'Absent' ? 'badge-danger' : 'badge-success';
          const statusText = a.status || 'Present'; // Fallback for old records
          
          tbody.innerHTML += `
            <tr>
              <td>#${a.id}</td>
              <td>${userName}</td>
              <td><strong>${a.date}</strong></td>
              <td><span class="badge ${badgeClass}">${statusText}</span></td>
              <td>
                <button class="btn" style="padding: 0.4rem 0.8rem; background: var(--primary); color: white;" onclick='editAttendance(${JSON.stringify(a)})'>Edit</button>
                <button class="btn" style="padding: 0.4rem 0.8rem; background: var(--danger); color: white;" onclick="deleteAttendance(${a.id})">Delete</button>
              </td>
            </tr>
          `;
        });
      }
    }
    
    function editAttendance(a) {
      document.getElementById('aId').value = a.id;
      document.getElementById('aUserId').value = a.userId;
      document.getElementById('aDate').value = a.date;
      document.getElementById('aStatus').value = a.status || 'Present';
      document.getElementById('modalTitle').innerText = 'Edit Attendance';
      showModal('addAttendanceModal');
    }

    async function deleteAttendance(id) {
      if(confirm('Are you sure you want to delete this attendance record?')) {
        await callApi(`/attendance/${id}`, 'DELETE');
        loadAttendance();
      }
    }

    async function addAttendance(e) {
      e.preventDefault();
      const id = document.getElementById('aId').value;
      const data = {
        userId: parseInt(document.getElementById('aUserId').value),
        date: document.getElementById('aDate').value,
        status: document.getElementById('aStatus').value
      };
      
      const method = id ? 'PUT' : 'POST';
      let endpoint = '';
      if(id) {
        endpoint = `/attendance/${id}`;
      } else {
        endpoint = '/attendance/mark';
      }
      
      const res = await callApi(endpoint, method, data);
      if (res) {
        hideModal('addAttendanceModal');
        document.getElementById('addAttendanceForm').reset();
        document.getElementById('aId').value = '';
        document.getElementById('modalTitle').innerText = 'Mark Attendance';
        loadAttendance();
      }
    }

    document.addEventListener("DOMContentLoaded", loadAttendance);
  </script>
</body>
</html>
