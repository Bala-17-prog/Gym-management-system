<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Member Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: url('images/kowsik2.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      padding: 20px;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 400px;
      color: #fff;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      font-size: 28px;
      color: #ffffff;
    }
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .input-group i {
      position: absolute;
      top: 14px;
      left: 14px;
      color: #aaa;
    }
    .input-group input {
      width: 100%;
      padding: 12px 12px 12px 42px;
      border: none;
      border-radius: 10px;
      background: rgba(252, 251, 251, 0.2);
      color: #fff;
      font-size: 15px;
      transition: background 0.3s;
    }
    .input-group input::placeholder {
      color: rgba(255,255,255,0.7);
    }
    .input-group input:focus {
      background: rgba(255, 255, 255, 0.3);
      outline: none;
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #010001, #000000);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    button[type="submit"]:hover {
      background: linear-gradient(45deg, #5f10b0, #1e5de2);
    }
    .toggle-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    .toggle-link a {
      color: #00e0ff;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .toggle-link a:hover {
      text-decoration: underline;
    }
    #registerForm, #forgotPasswordForm {
      display: none; /* Hidden by default */
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2 id="formTitle">Member Login</h2>
    
    <!-- LOGIN FORM -->
    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" placeholder="Email Address" required />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required />
      </div>
      <button type="submit">Login</button>
      <div style="text-align: center; margin-top: 15px;">
        <a onclick="toggleForms('forgot')" style="color: #ccc; font-size: 13px; text-decoration: none; cursor: pointer;">Forgot Password?</a>
      </div>
      <div class="toggle-link">
        Don't have an account? <a onclick="toggleForms('register')">Register here</a>
      </div>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="name" placeholder="Full Name" required />
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" placeholder="Email Address" required />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required />
      </div>
      <div class="input-group">
        <i class="fas fa-phone"></i>
        <input type="text" name="phone" placeholder="Phone Number" required />
      </div>
      <input type="hidden" name="role" value="user" />
      
      <button type="submit">Register</button>
      <div class="toggle-link">
        Already have an account? <a onclick="toggleForms('login')">Login here</a>
      </div>
    </form>

    <!-- FORGOT PASSWORD FORM -->
    <form id="forgotPasswordForm">
      <p style="text-align: center; margin-bottom: 20px; font-size: 14px; color: #ccc;">Enter your email to receive a temporary password.</p>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="forgotEmail" name="email" placeholder="Email Address" required />
      </div>
      <button type="submit">Reset Password</button>
      <div class="toggle-link">
        Remembered it? <a onclick="toggleForms('login')">Login here</a>
      </div>
    </form>
    
    <div style="text-align: center; margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px;">
        <a href="admin-login.html" style="color: #ccc; font-size: 13px; text-decoration: none;">Are you an Admin? <span style="color: #00e0ff;">Admin Portal</span></a>
    </div>

    <!-- We must include the hidden sections required by userScript.js so it doesn't break -->
    <div id="registerSection" style="display:none;"></div>
    <div id="loginSection" style="display:none;"></div>
    <div id="userDetailsSection" style="display:none;">
        <p id="userName"></p>
        <p id="userEmail"></p>
        <p id="userPhone"></p>
        <button id="updateBtn"></button>
        <button id="deleteBtn"></button>
    </div>
    <div id="updateFormSection" style="display:none;">
        <form id="updateForm"><input name="id"><input name="name"><input name="email"><input name="phone"></form>
    </div>

  </div>

  <script>
    function toggleForms(type) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const forgotForm = document.getElementById('forgotPasswordForm');
      const title = document.getElementById('formTitle');
      
      loginForm.style.display = 'none';
      registerForm.style.display = 'none';
      forgotForm.style.display = 'none';

      if (type === 'register') {
        registerForm.style.display = 'block';
        title.innerText = "Create Account";
      } else if (type === 'forgot') {
        forgotForm.style.display = 'block';
        title.innerText = "Reset Password";
      } else {
        loginForm.style.display = 'block';
        title.innerText = "Member Login";
      }
    }
  </script>
  <!-- Load the API wrapper and event listeners -->
  <script src="userScript.js"></script>
</body>
</html>
