<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: url('images/kowsik2.jpg') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      width: 350px;
      color: #fff;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      font-size: 28px;
      color: #ffffff;
    }
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .input-group i {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #aaa;
    }
    .input-group input {
      width: 100%;
      padding: 12px 12px 12px 38px;
      border: none;
      border-radius: 10px;
      background: rgba(252, 251, 251, 0.2);
      color: #fff;
      font-size: 15px;
      transition: background 0.3s;
    }
    .input-group input:focus {
      background: rgba(255, 255, 255, 0.3);
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #010001, #000000);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: linear-gradient(45deg, #5f10b0, #1e5de2);
    }
    .error {
      color: #ff4d4d;
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="email" id="adminUsername" placeholder="Email Address" required />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="adminPassword" placeholder="Password" required />
      </div>
      <button type="submit">Login</button>
      <p class="error" id="loginError">Invalid username or password</p>
      <div style="text-align: center; margin-top: 25px; font-size: 13px;">
        <p style="color: #ddd;">Are you a Member? <a href="user.html" style="color: #00d2ff; text-decoration: none; font-weight: 600;">Member Portal</a></p>
      </div>
    </form>
  </div>

  <script>
    document.getElementById("adminLoginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.getElementById("adminUsername").value;
      const password = document.getElementById("adminPassword").value;
      const errorMsg = document.getElementById("loginError");
      errorMsg.style.display = "none";

      try {
        const response = await fetch('/api/user/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        if (response.ok) {
           const result = await response.json();
           if (result.role && result.role.toLowerCase() === 'admin') {
               sessionStorage.setItem("adminLoggedIn", "true");
               sessionStorage.setItem('jwtToken', result.token);
               sessionStorage.setItem('currentUser', JSON.stringify(result));
               window.location.href = "index.html";
           } else {
               errorMsg.innerText = "Access denied. You are not an admin.";
               errorMsg.style.display = "block";
           }
        } else {
           errorMsg.innerText = "Invalid credentials";
           errorMsg.style.display = "block";
        }
      } catch (err) {
        errorMsg.innerText = "Error connecting to server";
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
